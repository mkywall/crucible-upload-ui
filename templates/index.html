<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crucible Upload</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: #f5f7fa; }
    .card { border-top: 4px solid #0d6efd; }
    .readonly-field {
      background: #e9ecef;
      border: 1px solid #ced4da;
      border-radius: 0.375rem;
      padding: 0.375rem 0.75rem;
      min-height: 2.25rem;
      color: #495057;
      font-size: 0.95rem;
    }
    .spinner-border-sm { width: 1rem; height: 1rem; }
    #status-box { min-height: 2.5rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container-fluid">
      <span class="navbar-brand fw-semibold">Crucible Upload</span>
    </div>
  </nav>

  <div class="container-fluid px-4">

    <!-- Row 1: User Info + Sample Info -->
    <div class="row g-4 mb-4">

      <!-- User Info -->
      <div class="col-12 col-md-6">
        <div class="card h-100 shadow-sm">
          <div class="card-body">
            <h5 class="card-title text-primary mb-3">User Info</h5>

            <!-- Email -->
            <label class="form-label fw-semibold">Email</label>
            <div class="input-group mb-1">
              <input id="email" type="email" class="form-control"
                     placeholder="Enter your email address"
                     onkeydown="if(event.key==='Enter') lookupUser()" />
              <button class="btn btn-outline-primary" onclick="lookupUser()" id="btn-user-lookup">
                <span id="spinner-user" class="spinner-border spinner-border-sm d-none" role="status"></span>
                <span id="icon-user">&#128270;</span>
              </button>
            </div>
            <div class="form-text mb-3">Press Enter or click 🔍 to look up</div>

            <!-- Name -->
            <label class="form-label fw-semibold">Name</label>
            <div id="user-name" class="readonly-field mb-3 text-muted">—</div>

            <!-- ORCID -->
            <label class="form-label fw-semibold">ORCID</label>
            <div id="user-orcid" class="readonly-field mb-3 text-muted">—</div>

            <!-- Project -->
            <label class="form-label fw-semibold">Project</label>
            <select id="project" class="form-select mb-3" disabled>
              <option value="">Look up a user first</option>
            </select>

            <!-- Instrument -->
            <label class="form-label fw-semibold">Instrument</label>
            <select id="instrument" class="form-select">
              <option value="">Select instrument</option>
            </select>

          </div>
        </div>
      </div>

      <!-- Sample Info -->
      <div class="col-12 col-md-6">
        <div class="card h-100 shadow-sm">
          <div class="card-body">
            <h5 class="card-title text-primary mb-1">Sample Info</h5>
            <p class="text-muted small mb-3">Optional — look up by name or unique ID</p>

            <!-- Sample Name -->
            <label class="form-label fw-semibold">Sample Name</label>
            <div class="input-group mb-1">
              <input id="sample-name" type="text" class="form-control"
                     placeholder="Enter sample name"
                     onkeydown="if(event.key==='Enter') lookupSampleByName()" />
              <button class="btn btn-outline-primary" onclick="lookupSampleByName()" id="btn-sample-name">
                <span id="spinner-sample-name" class="spinner-border spinner-border-sm d-none" role="status"></span>
                <span id="icon-sample-name">&#128270;</span>
              </button>
            </div>
            <div class="form-text mb-3">Requires a project to be selected</div>

            <!-- OR divider -->
            <div class="d-flex align-items-center my-2 mb-3">
              <hr class="flex-grow-1" />
              <span class="mx-2 text-muted small">or</span>
              <hr class="flex-grow-1" />
            </div>

            <!-- Sample Unique ID -->
            <label class="form-label fw-semibold">Sample Unique ID</label>
            <div class="input-group mb-3">
              <input id="sample-uid" type="text" class="form-control"
                     placeholder="Enter unique ID"
                     onkeydown="if(event.key==='Enter') lookupSampleByUID()" />
              <button class="btn btn-outline-primary" onclick="lookupSampleByUID()" id="btn-sample-uid">
                <span id="spinner-sample-uid" class="spinner-border spinner-border-sm d-none" role="status"></span>
                <span id="icon-sample-uid">&#128270;</span>
              </button>
            </div>

            <!-- Description -->
            <label class="form-label fw-semibold">Description</label>
            <textarea id="description" class="form-control" rows="3"
                      placeholder=""
                      readonly style="background:#e9ecef;"></textarea>

          </div>
        </div>
      </div>
    </div>

    <!-- Row 2: Session -->
    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <h5 class="card-title text-primary mb-3">Session</h5>
        <div class="input-group mb-3">
          <input id="session-folder" type="text" class="form-control"
                 placeholder="No folder selected — click Browse"
                 readonly style="background:#e9ecef;" />
          <button class="btn btn-outline-secondary" onclick="browseFolder()">Browse…</button>
        </div>
        <label class="form-label fw-semibold">Comments</label>
        <textarea id="comments" class="form-control" rows="3"
                  placeholder="Any notes about this session (optional)..."></textarea>
      </div>
    </div>

    <!-- Row 3: Status + Upload -->
    <div class="d-flex align-items-center gap-3 mb-5">
      <div id="status-box" class="flex-grow-1"></div>
      <button id="btn-upload" class="btn btn-primary btn-lg px-5" onclick="doUpload()">
        <span id="spinner-upload" class="spinner-border spinner-border-sm d-none me-2" role="status"></span>
        Upload
      </button>
    </div>

  </div>

  <!-- Success Modal -->
  <div class="modal fade" id="success-modal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-success text-white">
          <h5 class="modal-title">Upload Successful!</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body text-center">
          <p>
            View your data in
            <a id="crucible-link" href="#" target="_blank">Crucible</a>
            or scan the QR code below into the Crucible Lens Android App.
          </p>
          <div id="qr-code" class="d-inline-block mt-2"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    // -------------------------------------------------------------------------
    // State
    // -------------------------------------------------------------------------
    const state = {
      orcid: "",
      projects: [],
    };

    // -------------------------------------------------------------------------
    // Init
    // -------------------------------------------------------------------------
    async function init() {
      const res = await fetch("/api/instruments");
      const instruments = await res.json();
      const sel = document.getElementById("instrument");
      instruments.forEach(name => {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        sel.appendChild(opt);
      });
    }

    // -------------------------------------------------------------------------
    // User lookup
    // -------------------------------------------------------------------------
    async function lookupUser() {
      const email = document.getElementById("email").value.trim();
      if (!email) return;

      setSpinner("user", true);
      clearStatus();

      try {
        const res = await fetch("/api/user/lookup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();
        if (!res.ok) {
          alert("User not found. Try entering your ORCID instead of an email address.");
          return;
        }

        state.orcid = data.orcid || "";
        state.projects = data.projects || [];

        setText("user-name", data.name || "—");
        setText("user-orcid", data.orcid || "—");
        populateProjects(state.projects);
      } catch (e) {
        showStatus("User lookup failed: " + e.message, "danger");
      } finally {
        setSpinner("user", false);
      }
    }

    function populateProjects(projects) {
      const sel = document.getElementById("project");
      sel.innerHTML = "";
      if (!projects.length) {
        sel.innerHTML = '<option value="">No projects found</option>';
        sel.disabled = true;
        return;
      }
      projects.forEach(p => {
        const opt = document.createElement("option");
        opt.value = p;
        opt.textContent = p.startsWith("MFUSER_") ? p + " (Internal Research)" : p;
        sel.appendChild(opt);
      });
      sel.disabled = false;
    }

    // Clear user info when email is manually cleared
    document.getElementById("email").addEventListener("input", function () {
      if (!this.value.trim()) {
        state.orcid = "";
        state.projects = [];
        setText("user-name", "—");
        setText("user-orcid", "—");
        const sel = document.getElementById("project");
        sel.innerHTML = '<option value="">Look up a user first</option>';
        sel.disabled = true;
      }
    });

    // -------------------------------------------------------------------------
    // Sample lookup
    // -------------------------------------------------------------------------
    async function lookupSample(payload, spinnerId) {
      const project = document.getElementById("project").value;
      if (!project) { showStatus("Select a project first.", "warning"); return; }

      setSpinner(spinnerId, true);
      clearStatus();

      try {
        const res = await fetch("/api/sample/lookup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ...payload, project_id: project }),
        });
        const data = await res.json();
        if (!res.ok) {
          alert("Sample not found");
          document.getElementById("sample-name").value = "";
          document.getElementById("sample-uid").value = "";
          document.getElementById("description").value = "";
          return;
        }

        document.getElementById("sample-name").value = data.sample_name || "";
        document.getElementById("sample-uid").value = data.unique_id || "";
        document.getElementById("description").value = data.description || "";
      } catch (e) {
        showStatus("Sample lookup failed: " + e.message, "danger");
      } finally {
        setSpinner(spinnerId, false);
      }
    }

    function lookupSampleByName() {
      const name = document.getElementById("sample-name").value.trim();
      if (!name) return;
      lookupSample({ sample_name: name }, "sample-name");
    }

    function lookupSampleByUID() {
      const uid = document.getElementById("sample-uid").value.trim();
      if (!uid) return;
      lookupSample({ sample_unique_id: uid }, "sample-uid");
    }

    // Clear description when both sample fields are cleared
    ["sample-name", "sample-uid"].forEach(id => {
      document.getElementById(id).addEventListener("input", () => {
        const n = document.getElementById("sample-name").value.trim();
        const u = document.getElementById("sample-uid").value.trim();
        if (!n && !u) document.getElementById("description").value = "";
      });
    });

    // -------------------------------------------------------------------------
    // Browse
    // -------------------------------------------------------------------------
    async function browseFolder() {
      try {
        const res = await fetch("/api/browse");
        const data = await res.json();
        if (data.path) document.getElementById("session-folder").value = data.path;
      } catch (e) {
        showStatus("Folder browse failed: " + e.message, "danger");
      }
    }

    // -------------------------------------------------------------------------
    // Upload
    // -------------------------------------------------------------------------
    async function doUpload() {
      const orcid = state.orcid;
      const project_id = document.getElementById("project").value;
      const instrument_name = document.getElementById("instrument").value;
      const session_folder_path = document.getElementById("session-folder").value.trim();

      const missing = [];


      if (!orcid) missing.push("email (look up user first)");
      if (!project_id) missing.push("project");
      if (!instrument_name) missing.push("instrument");
      if (!session_folder_path) missing.push("session folder");

      if (missing.length) {
        showStatus("Please fill in: " + missing.join(", ") + ".", "danger");
        return;
      }

      setSpinner("upload", true);
      document.getElementById("btn-upload").disabled = true;
      clearStatus();

      try {
        const res = await fetch("/api/upload", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            orcid,
            project_id,
            instrument_name,
            session_folder_path,
            sample_unique_id: document.getElementById("sample-uid").value.trim(),
            comments: document.getElementById("comments").value.trim(),
          }),
        });
        const data = await res.json();
        if (!res.ok) { showStatus(data.error, "danger"); return; }
        showSuccessModal(data.session_dsid, data.project_id);
      } catch (e) {
        showStatus("Upload error: " + e.message, "danger");
      } finally {
        setSpinner("upload", false);
        document.getElementById("btn-upload").disabled = false;
      }
    }

    // -------------------------------------------------------------------------
    // Success modal with QR code
    // -------------------------------------------------------------------------
    function showSuccessModal(sessionDsid, projectId) {
      const baseUrl = "https://crucible-graph-explorer-776258882599.us-central1.run.app";
      document.getElementById("crucible-link").href = baseUrl + "/" + projectId;

      const qrContainer = document.getElementById("qr-code");
      qrContainer.innerHTML = "";
      new QRCode(qrContainer, {
        text: sessionDsid,
        width: 200,
        height: 200,
      });

      new bootstrap.Modal(document.getElementById("success-modal")).show();
    }

    // -------------------------------------------------------------------------
    // Helpers
    // -------------------------------------------------------------------------
    function setSpinner(id, on) {
      document.getElementById("spinner-" + id).classList.toggle("d-none", !on);
      const icon = document.getElementById("icon-" + id);
      if (icon) icon.classList.toggle("d-none", on);
    }

    function setText(id, val) {
      const el = document.getElementById(id);
      el.textContent = val;
      el.classList.toggle("text-muted", val === "—");
    }

    function showStatus(msg, type) {
      document.getElementById("status-box").innerHTML =
        `<div class="alert alert-${type} alert-dismissible mb-0 py-2" role="alert">
          ${msg}
          <button type="button" class="btn-close py-2" data-bs-dismiss="alert"></button>
        </div>`;
    }

    function clearStatus() {
      document.getElementById("status-box").innerHTML = "";
    }

    init();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
